name: Deploy Infrastructure

on:
  push:
    branches: [master]
    paths: ['infra/**']
  workflow_dispatch:
    inputs:
      environmentName:
        description: 'Environment name (resource prefix)'
        required: true
        default: 'hadashon'
      location:
        description: 'Azure region'
        required: true
        default: 'westeurope'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ inputs.location || 'westeurope' }}
          template: infra/main.bicep
          parameters: >
            environmentName=${{ inputs.environmentName || 'hadashon' }}
            location=${{ inputs.location || 'westeurope' }}
          deploymentName: hadashon-${{ github.run_number }}
